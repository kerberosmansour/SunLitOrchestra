# CodeQL static analysis for the Rust workspace.
#
# Public repo, so Code Scanning is free. Runs on PRs into main, on pushes
# to main, and weekly so newly published queries get a chance to fire
# against unchanged code. Findings surface under the repo's Security tab
# and on PRs as inline review comments.

name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Mondays 06:00 UTC — pick up new query releases on quiet code.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - rust
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          category: "/language:${{ matrix.language }}"
