# Dependabot keeps cargo and GitHub Actions deps current and surfaces
# transitive CVEs. Weekly cadence keeps the noise low; security advisories
# always open PRs immediately regardless of schedule.

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    # 72h cooldown (anti-supply-chain): wait for community vetting before adopting.
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: chore
      include: scope
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    # 72h cooldown (anti-supply-chain): wait for community vetting before adopting.
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
