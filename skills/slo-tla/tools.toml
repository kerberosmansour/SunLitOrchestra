# Pinned TLA+ tool artifacts. Do not bump without updating the SHA-256.
#
# When updating:
#   1. Download the new release and compute its SHA-256 locally.
#   2. Cross-check by fetching the upstream `.sha256` sibling file if the
#      release publishes one.
#   3. Update BOTH `version` and `sha256` in the same commit.
#   4. Add a CHANGELOG note to `skills/slo-tla/UPSTREAM.md` explaining why.
#
# The `sha256` values below are left as "UNSET" in this repo's initial commit.
# Before this skill's first use, the maintainer must:
#   1. Run `curl -fL <url> | shasum -a 256`
#   2. Replace "UNSET" with the computed hex digest.
# This is deliberate — we do not ship a hash we haven't computed ourselves.

[tlc]
version = "1.8.0"
url = "https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar"
sha256 = "UNSET"

# Apalache is fetched lazily only when TLC reports state explosion.
# This entry exists so the lazy-download helper has a pinned reference.
[apalache]
version = "0.44.11"
url = "https://github.com/apalache-mc/apalache/releases/download/v0.44.11/apalache.tgz"
sha256 = "UNSET"
